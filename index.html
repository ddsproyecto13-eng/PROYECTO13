<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Catálogo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F7F5F0; --bg2:#FFFFFF; --surface:#FFFFFF; --surface2:#F3F0E9;
    --ink:#17150F; --muted:#8A8377; --gold:#17150F; --gold2:#3A362B; --gold-deep:#000000;
    --line:#E6E2D9; --line2:rgba(23,21,15,.18); --ok:#2F7A5A; --err:#B23A2C;
    --shadow:0 1px 2px rgba(0,0,0,.04),0 12px 34px rgba(0,0,0,.09);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased}
  img{display:block;max-width:100%}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  a{color:inherit;text-decoration:none}
  .serif{font-family:'Cormorant Garamond',serif}

  header{position:sticky;top:0;z-index:40;background:rgba(247,245,240,.82);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
  .bar{max-width:1160px;margin:0 auto;padding:12px 20px;display:flex;align-items:center;gap:16px}
  .logo-wrap{display:flex;align-items:center;gap:11px;white-space:nowrap}
  .logo-wrap img{width:42px;height:42px;border-radius:50%;border:1.5px solid var(--line2);object-fit:cover}
  .brand{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;color:var(--gold);letter-spacing:.5px;line-height:1}
  .search{flex:1;position:relative;max-width:420px;margin-left:auto}
  .search input{width:100%;padding:11px 14px 11px 40px;border:1px solid var(--line);border-radius:100px;background:var(--surface);font-size:14px;color:var(--ink);outline:none;transition:border-color .2s}
  .search input::placeholder{color:var(--muted)}
  .search input:focus{border-color:var(--gold)}
  .search svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted)}
  .cart-btn{position:relative;display:flex;align-items:center;gap:7px;padding:11px 16px;background:var(--gold);color:#F7F5F0;border-radius:100px;font-size:13.5px;font-weight:600;white-space:nowrap}
  .cart-btn:hover{background:var(--gold2)}
  .cart-btn .count{position:absolute;top:-6px;right:-6px;min-width:20px;height:20px;padding:0 5px;background:#F7F5F0;color:var(--gold);border-radius:100px;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;border:2px solid var(--bg)}

  .hero{max-width:1160px;margin:0 auto;padding:44px 20px 14px;text-align:center;position:relative}
  .hero::before{content:"";position:absolute;top:0;left:50%;transform:translateX(-50%);width:420px;height:240px;max-width:90%;background:radial-gradient(ellipse,rgba(23,21,15,.16),transparent 70%);pointer-events:none}
  .hero-logo{width:118px;height:118px;border-radius:50%;border:2px solid var(--line2);object-fit:cover;margin:0 auto 18px;position:relative;box-shadow:0 0 0 6px rgba(23,21,15,.05)}
  .hero h1{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:clamp(32px,6vw,52px);color:var(--gold);line-height:1.02;letter-spacing:1px;position:relative}
  .hero p{color:var(--muted);margin-top:8px;font-size:15px;position:relative}
  .socials{display:flex;gap:10px;justify-content:center;margin-top:18px;position:relative}
  .socials a{width:42px;height:42px;border-radius:50%;border:1px solid var(--line);background:var(--surface);display:flex;align-items:center;justify-content:center;color:var(--gold);transition:.18s}
  .socials a:hover{background:var(--gold);color:#F7F5F0;border-color:var(--gold);transform:translateY(-2px)}

  .filters{max-width:1160px;margin:0 auto;padding:16px 20px 4px;display:flex;flex-wrap:wrap;gap:8px;align-items:center}
  .chip{padding:8px 15px;border:1px solid var(--line);background:var(--surface);border-radius:100px;font-size:13px;font-weight:500;color:var(--ink);transition:all .15s}
  .chip:hover{border-color:var(--gold)}
  .chip.on{background:var(--gold);color:#F7F5F0;border-color:var(--gold);font-weight:600}
  .filters .sep{width:1px;height:22px;background:var(--line);margin:0 4px}
  .sort{margin-left:auto}
  .sort select{padding:8px 12px;border:1px solid var(--line);border-radius:100px;background:var(--surface);font-size:13px;font-family:inherit;color:var(--ink);outline:none;cursor:pointer}
  .count-line{max-width:1160px;margin:0 auto;padding:14px 20px 0;font-size:13px;color:var(--muted)}

  .grid{max-width:1160px;margin:0 auto;padding:16px 20px 60px;display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:18px}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:16px;overflow:hidden;display:flex;flex-direction:column;transition:transform .2s,box-shadow .2s,border-color .2s;cursor:pointer}
  .card:hover{transform:translateY(-3px);box-shadow:var(--shadow);border-color:var(--line2)}
  .thumb{aspect-ratio:1/1;background:var(--surface2);position:relative;overflow:hidden}
  .thumb img{width:100%;height:100%;object-fit:cover}
  .thumb .noimg{width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:var(--gold);opacity:.35}
  .badge{position:absolute;top:10px;left:10px;background:rgba(23,21,15,.9);color:#F7F5F0;font-size:11px;font-weight:600;padding:4px 10px;border-radius:100px;letter-spacing:.02em;border:1px solid var(--line2)}
  .fav{position:absolute;top:10px;right:10px;background:var(--gold);color:#F7F5F0;font-size:10px;font-weight:700;padding:4px 9px;border-radius:100px;text-transform:uppercase;letter-spacing:.05em}
  .card-body{padding:14px 15px 16px;display:flex;flex-direction:column;flex:1}
  .eyebrow{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--gold)}
  .card h3{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:21px;line-height:1.1;margin:2px 0 6px;color:var(--ink)}
  .desc{font-size:12.5px;color:var(--muted);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:34px}
  .meta{display:flex;gap:6px;margin:10px 0 12px;flex-wrap:wrap}
  .tag{font-size:11px;color:var(--muted);background:var(--surface2);padding:3px 9px;border-radius:100px;border:1px solid var(--line)}
  .row{margin-top:auto;display:flex;align-items:flex-end;justify-content:space-between;gap:8px}
  .from-lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;display:block}
  .price{font-family:'Cormorant Garamond',serif;font-size:25px;font-weight:600;color:var(--gold);line-height:1}
  .promo-flag{position:absolute;top:10px;right:10px;background:var(--gold);color:#fff;font-size:10px;font-weight:700;padding:4px 9px;border-radius:100px;text-transform:uppercase;letter-spacing:.04em}
  .price-old{font-size:13px;color:var(--muted);text-decoration:line-through;margin-right:6px;font-family:'Inter';font-weight:400}
  .size .old{text-decoration:line-through;opacity:.55;font-size:11px;margin-right:4px}
  .m-price .price-old{font-size:15px}
  .ci-info .p .old{text-decoration:line-through;color:var(--muted);font-size:11px;margin-right:5px}
  .ci-promo{font-size:9.5px;font-weight:700;color:#fff;background:var(--err);padding:2px 6px;border-radius:100px;margin-left:6px;letter-spacing:.03em}
  .promo-line{display:flex;justify-content:space-between;font-size:12.5px;color:var(--ok);padding:5px 0}
  .view{font-size:12.5px;color:var(--gold);font-weight:600;white-space:nowrap;padding-bottom:3px}

  .state{max-width:1160px;margin:0 auto;padding:80px 20px;text-align:center;color:var(--muted)}
  .state .serif{font-size:28px;color:var(--ink);display:block;margin-bottom:6px}
  .spinner{width:34px;height:34px;border:3px solid var(--line);border-top-color:var(--gold);border-radius:50%;margin:0 auto 16px;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);opacity:0;visibility:hidden;transition:.25s;z-index:50}
  .overlay.on{opacity:1;visibility:visible}
  .drawer{position:fixed;top:0;right:0;height:100%;width:min(420px,100%);background:var(--bg2);z-index:60;transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;box-shadow:-10px 0 40px rgba(0,0,0,.5);border-left:1px solid var(--line)}
  .drawer.on{transform:translateX(0)}
  .drawer-head{padding:20px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
  .drawer-head .serif{font-size:24px;color:var(--gold);flex:1}
  .close{width:34px;height:34px;border-radius:50%;background:var(--surface);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--muted)}
  .close:hover{color:var(--ink)}
  .items{flex:1;overflow-y:auto;padding:8px 20px}
  .ci{display:flex;gap:12px;padding:14px 0;border-bottom:1px solid var(--line)}
  .ci-img{width:64px;height:64px;border-radius:10px;background:var(--surface2);object-fit:cover;flex-shrink:0;overflow:hidden}
  .ci-img .noimg{width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:var(--gold);opacity:.35}
  .ci-info{flex:1;min-width:0}
  .ci-info h4{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600;line-height:1.1}
  .ci-info .s{font-size:12px;color:var(--muted)}
  .ci-info .p{font-size:14px;font-weight:600;margin-top:2px;color:var(--gold)}
  .qty{display:flex;align-items:center;border:1px solid var(--line);border-radius:100px;overflow:hidden;height:30px}
  .qty button{width:30px;height:30px;font-size:16px;color:var(--ink);display:flex;align-items:center;justify-content:center}
  .qty button:hover{background:var(--surface2)}
  .qty span{min-width:24px;text-align:center;font-size:13px;font-weight:600}
  .rm{font-size:11px;color:var(--err);margin-top:6px}
  .drawer-foot{padding:20px;border-top:1px solid var(--line);background:var(--surface)}
  .foot-field{margin-bottom:12px}
  .foot-field label{font-size:12px;color:var(--muted);display:block;margin-bottom:4px}
  .foot-field input{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:10px;font-size:14px;font-family:inherit;outline:none;background:var(--bg2);color:var(--ink)}
  .foot-field input:focus{border-color:var(--gold)}
  .total{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px}
  .total .serif{font-size:22px}
  .total b{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:600;color:var(--gold)}
  .wa{width:100%;padding:15px;background:var(--ok);color:#fff;border-radius:12px;font-size:15px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:9px}
  .wa:hover{filter:brightness(1.08)}
  .cart-empty{text-align:center;padding:60px 20px;color:var(--muted)}
  .cart-empty .serif{font-size:22px;color:var(--ink);display:block;margin-bottom:4px}

  .modal{position:fixed;inset:0;z-index:70;display:none;align-items:flex-start;justify-content:center;padding:20px;background:rgba(0,0,0,.75);overflow-y:auto}
  .modal.on{display:flex}
  .modal-box{background:var(--bg2);border:1px solid var(--line);border-radius:20px;max-width:520px;width:100%;overflow:hidden;position:relative;margin:auto}
  .m-hero{position:relative;aspect-ratio:1/1;background:var(--surface2)}
  .m-hero img{width:100%;height:100%;object-fit:cover}
  .m-hero .noimg{width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:var(--gold);opacity:.35}
  .m-hero .m-tags{position:absolute;left:16px;bottom:14px;display:flex;gap:6px}
  .m-hero .m-tags .tag{background:rgba(23,21,15,.85);color:#F7F5F0;border-color:var(--line2)}
  .m-close{position:absolute;top:14px;right:14px;width:38px;height:38px;border-radius:50%;background:rgba(23,21,15,.6);border:1px solid var(--line2);font-size:22px;color:#fff;display:flex;align-items:center;justify-content:center;z-index:2}
  .m-body{padding:22px}
  .m-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
  .m-body h2{font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:600;color:var(--ink);line-height:1.05}
  .m-body .m-eyebrow{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--gold)}
  .m-price{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:600;color:var(--gold);white-space:nowrap;text-align:right}
  .m-price small{display:block;font-family:'Inter';font-size:10px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase}
  .m-desc{color:var(--ink);font-size:13.5px;margin:12px 0 4px;opacity:.92;line-height:1.65}
  .m-sizes-lbl{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin:18px 0 10px}
  .sizes{display:flex;flex-wrap:wrap;gap:8px}
  .size{padding:10px 16px;border:1px solid var(--line);background:var(--surface);border-radius:12px;font-size:13.5px;font-weight:500;color:var(--ink);transition:.15s}
  .size:hover{border-color:var(--gold)}
  .size.on{background:var(--gold);color:#F7F5F0;border-color:var(--gold);font-weight:600}
  .m-actions{margin-top:20px;display:flex;flex-direction:column;gap:10px}
  .btn-add{width:100%;padding:14px;background:var(--gold);color:#F7F5F0;border-radius:12px;font-size:15px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:8px}
  .btn-add:hover{background:var(--gold2)}
  .btn-solo{width:100%;padding:14px;background:var(--ok);color:#fff;border-radius:12px;font-size:15px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:8px}
  .btn-solo:hover{filter:brightness(1.08)}

  footer{border-top:1px solid var(--line);margin-top:20px;padding:36px 20px 40px;text-align:center}
  .foot-logo{width:64px;height:64px;border-radius:50%;border:1px solid var(--line2);object-fit:cover;margin:0 auto 14px}
  footer .fname{font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--gold);margin-bottom:14px}
  footer .socials{margin-top:0;margin-bottom:18px}
  footer .adm{color:var(--muted);font-size:12.5px}
  footer .adm a{color:var(--gold)}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--gold);color:#F7F5F0;padding:12px 20px;border-radius:100px;font-size:14px;font-weight:600;opacity:0;transition:.3s;z-index:90;pointer-events:none}
  .toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

  @media(max-width:640px){
    .brand{font-size:19px}
    .cart-btn .lbl{display:none}
    .search{order:3;flex-basis:100%;max-width:none;margin-left:0}
    .bar{flex-wrap:wrap}
  }
  @media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>
<header>
  <div class="bar">
    <a class="logo-wrap" href="#top"><img id="logoHeader" alt="Logo" /><span class="brand" id="brand">DAVA PARFUMS</span></a>
    <div class="search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="search" type="search" placeholder="Buscar perfume…" autocomplete="off" />
    </div>
    <button class="cart-btn" id="cartBtn">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.7 13.4a2 2 0 0 0 2 1.6h9.7a2 2 0 0 0 2-1.6L23 6H6"/></svg>
      <span class="lbl">Carrito</span><span class="count" id="cartCount" style="display:none">0</span>
    </button>
  </div>
</header>

<a id="top"></a>
<section class="hero">
  <img class="hero-logo" id="logoHero" alt="Logo" />
  <h1 id="heroTitle">DAVA PARFUMS</h1>
  <p id="heroTag"></p>
  <div class="socials" id="socialsHero"></div>
</section>

<div class="filters" id="catFilters"></div>
<div class="filters" id="genFilters" style="padding-top:0">
  <span class="sep" style="display:none"></span>
  <div class="sort">
    <select id="sort">
      <option value="destacado">Destacados primero</option>
      <option value="precio-asc">Precio: menor a mayor</option>
      <option value="precio-desc">Precio: mayor a menor</option>
      <option value="nombre">Nombre A–Z</option>
    </select>
  </div>
</div>

<div class="count-line" id="countLine"></div>
<main class="grid" id="grid"></main>
<div id="stateBox"></div>

<footer>
  <img class="foot-logo" id="logoFoot" alt="Logo" />
  <div class="fname" id="footName">DAVA PARFUMS</div>
  <div class="socials" id="socialsFoot"></div>
</footer>

<div class="overlay" id="overlay"></div>
<aside class="drawer" id="drawer" aria-label="Carrito de compras">
  <div class="drawer-head"><span class="serif">Tu pedido</span><button class="close" id="closeCart" aria-label="Cerrar">×</button></div>
  <div class="items" id="cartItems"></div>
  <div class="drawer-foot" id="cartFoot" style="display:none">
    <div class="foot-field"><label for="cName">Tu nombre (para el pedido)</label><input id="cName" type="text" placeholder="Ej. María López" /></div>
    <div class="total"><span class="serif">Total</span><b id="cartTotal">S/ 0</b></div>
    <button class="wa" id="waBtn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17.5 14.4c-.3-.2-1.7-.9-2-1-.3-.1-.5-.1-.6.1-.2.3-.7 1-.9 1.1-.2.2-.3.2-.6.1-.3-.2-1.2-.5-2.3-1.4-.9-.8-1.4-1.7-1.6-2-.2-.3 0-.5.1-.6.1-.1.3-.3.4-.5.1-.2.2-.3.3-.5.1-.2 0-.4 0-.5-.1-.1-.6-1.5-.9-2-.2-.5-.4-.4-.6-.4h-.5c-.2 0-.5.1-.7.3-.3.3-1 1-1 2.4s1 2.8 1.2 3c.1.2 2 3.1 4.9 4.3.7.3 1.2.5 1.6.6.7.2 1.3.2 1.8.1.5-.1 1.7-.7 1.9-1.4.2-.7.2-1.2.2-1.4-.1-.1-.3-.2-.6-.3M12 2a10 10 0 0 0-8.6 15l-1.3 4.8 4.9-1.3A10 10 0 1 0 12 2"/></svg>
      Pedir por WhatsApp
    </button>
  </div>
</aside>

<div class="modal" id="modal"><div class="modal-box" id="modalBox"></div></div>
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

function presActivas(p){
  return (p.presentaciones||[]).filter(x=>x&&x.activo&&Number(x.precio)>0).sort((a,b)=>Number(a.precio)-Number(b.precio));
}

/* ---------- MOTOR DE PROMOCIONES ---------- */
function promosActivas(){
  const hoy=new Date().toISOString().slice(0,10);
  return PROMOS.filter(p=>p.activo && (!p.desde||hoy>=p.desde) && (!p.hasta||hoy<=p.hasta));
}
function tallaOk(cfg,tamano){ return !cfg.tallas||!cfg.tallas.length||cfg.tallas.includes(tamano); }
// precio por unidad aplicando promos de tipo "producto" y "general" (toma el mejor descuento)
function precioUnit(prod,tamano,base){
  let mejor=base, promo=null;
  promosActivas().forEach(pr=>{
    const c=pr.config||{}; let pct=0, ok=false;
    if(pr.tipo==='producto'){ ok=(c.productos||[]).includes(prod.nombre)&&tallaOk(c,tamano); pct=c.pct||0; }
    else if(pr.tipo==='general'){ ok=(c.alcance==='todo'||(c.alcance==='categoria'&&prod.categoria===c.categoria)); pct=c.pct||0; }
    if(ok&&pct>0){ const np=base*(1-pct/100); if(np<mejor){ mejor=np; promo=pr.nombre; } }
  });
  return {precio:Math.round(mejor*100)/100, original:base, promo};
}
// lista de presentaciones activas con su precio efectivo (para catálogo/modal)
function effList(p){ return presActivas(p).map(pr=>({...pr, ...precioUnit(p,pr.tamano,Number(pr.precio))})); }
// cálculo del carrito con promos de cantidad y combo
function computeCart(){
  const lines=cart.map(it=>{
    const prod=PRODUCTS.find(x=>x.id===it.id)||{nombre:it.nombre,categoria:null};
    const base=Number(it.precio);
    let {precio:unit,promo}=precioUnit(prod,it.tamano,base);
    promosActivas().filter(p=>p.tipo==='cantidad').forEach(pr=>{
      const c=pr.config||{};
      if((c.productos||[]).includes(it.nombre)&&tallaOk(c,it.tamano)&&it.qty>=(c.min||0)){
        let np=c.modo==='precio'?(+c.valor||0):base*(1-(+c.valor||0)/100);
        np=Math.round(np*100)/100;
        if(np<unit){ unit=np; promo=pr.nombre; }
      }
    });
    return {...it,unit,unitOrig:base,promo,lineTotal:Math.round(unit*it.qty*100)/100};
  });
  const comboDisc=[];
  promosActivas().filter(p=>p.tipo==='combo').forEach(pr=>{
    const c=pr.config||{};
    let units=[];
    lines.forEach(l=>{ if((c.productos||[]).includes(l.nombre)&&tallaOk(c,l.tamano)){ for(let k=0;k<l.qty;k++) units.push(l.unit); } });
    const N=+c.cantidad||0, P=+c.precio_total||0;
    if(N>0&&units.length>=N){
      units.sort((a,b)=>b-a); const groups=Math.floor(units.length/N); let saved=0;
      for(let g=0;g<groups;g++){ const grp=units.slice(g*N,(g+1)*N); const normal=grp.reduce((s,x)=>s+x,0); if(P<normal) saved+=(normal-P); }
      saved=Math.round(saved*100)/100;
      if(saved>0) comboDisc.push({nombre:pr.nombre,monto:saved});
    }
  });
  const subtotal=Math.round(lines.reduce((s,l)=>s+l.lineTotal,0)*100)/100;
  const totalCombo=Math.round(comboDisc.reduce((s,c)=>s+c.monto,0)*100)/100;
  return {lines,comboDisc,subtotal,total:Math.max(0,Math.round((subtotal-totalCombo)*100)/100)};
}

async function load(){
  setState('<div class="spinner"></div><span class="serif">Cargando catálogo…</span>');
  const { data, error } = await sb.from('productos').select('*');
  if(error){ setState('<span class="serif">No se pudo cargar</span>Revisa las credenciales en config.js.<br><small style="opacity:.7">'+error.message+'</small>'); return; }
  PRODUCTS=(data||[]).filter(p=>p.visible!==false && presActivas(p).length>0);
  const rp=await sb.from('promociones').select('*'); PROMOS=rp.error?[]:(rp.data||[]);
  setState(''); buildFilters(); render();
}

function buildFilters(){
  const cats=[...new Set(PRODUCTS.map(p=>p.categoria).filter(Boolean))];
  const gens=[...new Set(PRODUCTS.map(p=>p.genero).filter(Boolean))];
  const cf=document.getElementById('catFilters'); cf.innerHTML='';
  cf.appendChild(makeChip('Todos','todos',()=>{fCat='todos';render()}));
  cats.forEach(c=>cf.appendChild(makeChip(c,c,()=>{fCat=c;render()})));
  const gf=document.getElementById('genFilters'); gf.querySelectorAll('.chip').forEach(e=>e.remove());
  const sep=gf.querySelector('.sep'); const sort=gf.querySelector('.sort');
  if(gens.length) sep.style.display='block';
  gens.forEach(g=>{ const c=makeChip(g,g,()=>{fGen=(fGen===g?'todos':g);render()},'gen'); gf.insertBefore(c,sort); });
}
function makeChip(label,val,onClick,dim){ const b=document.createElement('button'); b.className='chip'; b.textContent=label; b.dataset.v=val; if(dim) b.dataset.dim=dim; b.onclick=()=>{onClick();syncChips();}; return b; }
function syncChips(){
  document.querySelectorAll('#catFilters .chip').forEach(c=>c.classList.toggle('on',c.dataset.v===fCat));
  document.querySelectorAll('#genFilters .chip').forEach(c=>{
    const on=c.dataset.dim==='mom'?(c.dataset.v===fMom):(c.dataset.v===fGen);
    c.classList.toggle('on',on);
  });
}

function filtered(){
  let list=PRODUCTS.filter(p=>{
    const okCat=fCat==='todos'||p.categoria===fCat;
    const okGen=fGen==='todos'||p.genero===fGen;
    const okMom=fMom==='todos'||p.momento===fMom;
    const okQ=!q||(p.nombre+' '+(p.marca||'')+' '+(p.descripcion||'')).toLowerCase().includes(q);
    return okCat&&okGen&&okMom&&okQ;
  });
  const s=document.getElementById('sort').value;
  const desde=p=>{ const a=presActivas(p); return a.length?Number(a[0].precio):0; };
  list.sort((a,b)=>{
    if(s==='precio-asc') return desde(a)-desde(b);
    if(s==='precio-desc') return desde(b)-desde(a);
    if(s==='nombre') return a.nombre.localeCompare(b.nombre);
    return (b.destacado?1:0)-(a.destacado?1:0)||a.nombre.localeCompare(b.nombre);
  });
  return list;
}

function render(){
  syncChips();
  const list=filtered(); const grid=document.getElementById('grid');
  document.getElementById('countLine').textContent=list.length+(list.length===1?' producto':' productos');
  if(!list.length){ grid.innerHTML=''; setState('<span class="serif">Sin resultados</span>Prueba con otra búsqueda o filtro.'); return; }
  setState('');
  grid.innerHTML=list.map(p=>{
    const eff=effList(p); const desde=eff.reduce((m,x)=>x.precio<m.precio?x:m,eff[0]); const varias=eff.length>1;
    const hasPromo=eff.some(x=>x.precio<x.original); const promoName=(eff.find(x=>x.promo)||{}).promo;
    const img=p.imagen_url?`<img src="${p.imagen_url}" alt="${esc(p.nombre)}" loading="lazy">`:noimg;
    return `<article class="card" onclick="openModal('${p.id}')">
      <div class="thumb">
        <span class="badge">${eff.length} ${eff.length===1?'talla':'tallas'}</span>
        ${hasPromo?`<span class="promo-flag">${esc(promoName||'Oferta')}</span>`:(p.destacado?'<span class="fav">Destacado</span>':'')}
        ${img}
      </div>
      <div class="card-body">
        <span class="eyebrow">${esc(p.marca||'')}</span>
        <h3>${esc(p.nombre)}</h3>
        <p class="desc">${fmtLines(p.descripcion)[0]||''}</p>
        <div class="meta">
          ${p.categoria?`<span class="tag">${esc(p.categoria)}</span>`:''}
          ${p.genero?`<span class="tag">${esc(p.genero)}</span>`:''}
          ${p.momento?`<span class="tag">${esc(p.momento)}</span>`:''}
        </div>
        <div class="row">
          <div><span class="from-lbl">${varias?'Desde':'&nbsp;'}</span><div class="price">${hasPromo?`<span class="price-old">${money(desde.original)}</span>`:''}${money(desde.precio)}</div></div>
          <span class="view">Ver más →</span>
        </div>
      </div>
    </article>`;
  }).join('');
}
function setState(html){ document.getElementById('stateBox').innerHTML=html?`<div class="state">${html}</div>`:''; }
function esc(s){ return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
// separa la descripción en líneas: por saltos de línea o por " - " (guion entre espacios)
function fmtLines(s){
  return esc(s||'')
    .split(/\r?\n|\s+[-–—]\s+/)
    .map(x=>x.replace(/^[-–—]\s*/,'').trim())
    .filter(Boolean);
}
function fmtDesc(s){ return fmtLines(s).join('<br>'); }

let modalProd=null, modalSel=0;
function openModal(id){
  const p=PRODUCTS.find(x=>x.id===id); if(!p) return;
  modalProd=p; modalSel=0;
  const eff=effList(p);
  const img=p.imagen_url?`<img src="${p.imagen_url}" alt="${esc(p.nombre)}">`:noimg;
  const tags=[p.categoria,p.genero,p.momento].filter(Boolean).map(t=>`<span class="tag">${esc(t)}</span>`).join('');
  const sizes=eff.map((pr,i)=>`<button class="size ${i===0?'on':''}" data-i="${i}" onclick="selectSize(${i})">${esc(pr.tamano)} — ${pr.precio<pr.original?`<span class="old">${money(pr.original)}</span>`:''}${money(pr.precio)}</button>`).join('');
  const p0=eff[0];
  document.getElementById('modalBox').innerHTML=`
    <div class="m-hero">
      <button class="m-close" onclick="closeModal()">×</button>
      ${img}
      ${tags?`<div class="m-tags">${tags}</div>`:''}
    </div>
    <div class="m-body">
      <div class="m-top">
        <div><div class="m-eyebrow">${esc(p.marca||'')}</div><h2>${esc(p.nombre)}</h2></div>
        <div class="m-price" id="mPrice">${p0.precio<p0.original?`<span class="price-old">${money(p0.original)}</span>`:''}${money(p0.precio)}<small>${esc(p0.tamano)}</small></div>
      </div>
      ${p.descripcion?`<p class="m-desc">${fmtDesc(p.descripcion)}</p>`:''}
      <div class="m-sizes-lbl">Elige tu presentación</div>
      <div class="sizes">${sizes}</div>
      <div class="m-actions">
        <button class="btn-add" onclick="addSelected()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.7 13.4a2 2 0 0 0 2 1.6h9.7a2 2 0 0 0 2-1.6L23 6H6"/></svg>
          Agregar al pedido
        </button>
        <button class="btn-solo" onclick="waSolo()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.5 14.4c-.3-.2-1.7-.9-2-1-.3-.1-.5-.1-.6.1-.2.3-.7 1-.9 1.1-.2.2-.3.2-.6.1-.3-.2-1.2-.5-2.3-1.4-.9-.8-1.4-1.7-1.6-2-.2-.3 0-.5.1-.6.1-.1.3-.3.4-.5.1-.2.2-.3.3-.5.1-.2 0-.4 0-.5-.1-.1-.6-1.5-.9-2-.2-.5-.4-.4-.6-.4h-.5c-.2 0-.5.1-.7.3-.3.3-1 1-1 2.4s1 2.8 1.2 3c.1.2 2 3.1 4.9 4.3.7.3 1.2.5 1.6.6.7.2 1.3.2 1.8.1.5-.1 1.7-.7 1.9-1.4.2-.7.2-1.2.2-1.4-.1-.1-.3-.2-.6-.3M12 2a10 10 0 0 0-8.6 15l-1.3 4.8 4.9-1.3A10 10 0 1 0 12 2"/></svg>
          Pedir solo este
        </button>
      </div>
    </div>`;
  document.getElementById('modal').classList.add('on');
}
function selectSize(i){
  modalSel=i;
  const pr=effList(modalProd)[i];
  document.querySelectorAll('.size').forEach(b=>b.classList.toggle('on',+b.dataset.i===i));
  document.getElementById('mPrice').innerHTML=`${pr.precio<pr.original?`<span class="price-old">${money(pr.original)}</span>`:''}${money(pr.precio)}<small>${esc(pr.tamano)}</small>`;
}
function closeModal(){ document.getElementById('modal').classList.remove('on'); }
document.getElementById('modal').onclick=e=>{ if(e.target.id==='modal') closeModal(); };
function addSelected(){ const pr=effList(modalProd)[modalSel]; addToCart(modalProd,pr.tamano,pr.original); closeModal(); }
function waSolo(){
  const pr=effList(modalProd)[modalSel];
  const promoTxt=pr.precio<pr.original?` [${pr.promo||'Oferta'}]`:'';
  const msg=`*Pedido — ${CONFIG.TIENDA_NOMBRE}*\n\n• 1× ${modalProd.nombre} (${pr.tamano}) — ${money(pr.precio)}${promoTxt}`;
  window.open(`https://wa.me/${CONFIG.WHATSAPP}?text=${encodeURIComponent(msg)}`,'_blank');
}

function saveCart(){ localStorage.setItem('cart_'+CONFIG.TIENDA_NOMBRE, JSON.stringify(cart)); }
function addToCart(p,tamano,precio){
  const key=p.id+'__'+tamano; const it=cart.find(x=>x.key===key);
  if(it) it.qty++; else cart.push({key,id:p.id,nombre:p.nombre,marca:p.marca,tamano,precio,imagen_url:p.imagen_url,qty:1});
  saveCart(); renderCart(); toast(`${p.nombre} (${tamano}) agregado`);
}
function changeQty(key,d){ const it=cart.find(x=>x.key===key); if(!it) return; it.qty+=d; if(it.qty<=0) cart=cart.filter(x=>x.key!==key); saveCart(); renderCart(); }
function removeItem(key){ cart=cart.filter(x=>x.key!==key); saveCart(); renderCart(); }
function renderCart(){
  const r=computeCart();
  const n=cart.reduce((s,i)=>s+i.qty,0);
  const badge=document.getElementById('cartCount'); badge.textContent=n; badge.style.display=n?'flex':'none';
  const box=document.getElementById('cartItems'); const foot=document.getElementById('cartFoot');
  if(!cart.length){ box.innerHTML='<div class="cart-empty"><span class="serif">Tu pedido está vacío</span>Elige un perfume y su talla.</div>'; foot.style.display='none'; return; }
  foot.style.display='block';
  box.innerHTML=r.lines.map(l=>{
    const img=l.imagen_url?`<img class="ci-img" src="${l.imagen_url}" alt="">`:`<div class="ci-img">${noimg}</div>`;
    const disc=l.unit<l.unitOrig;
    return `<div class="ci">${img}
      <div class="ci-info"><h4>${esc(l.nombre)}</h4>
        <div class="s">${esc(l.marca||'')}${l.tamano?' · '+esc(l.tamano):''}</div>
        <div class="p">${disc?`<span class="old">${money(l.unitOrig*l.qty)}</span>`:''}${money(l.lineTotal)}${l.promo?`<span class="ci-promo">${esc(l.promo)}</span>`:''}</div>
        <button class="rm" onclick="removeItem('${l.key}')">Quitar</button>
      </div>
      <div class="qty"><button onclick="changeQty('${l.key}',-1)">−</button><span>${l.qty}</span><button onclick="changeQty('${l.key}',1)">+</button></div>
    </div>`;
  }).join('') + (r.comboDisc.length?`<div style="padding:10px 0 2px">${r.comboDisc.map(c=>`<div class="promo-line"><span>🎁 ${esc(c.nombre)}</span><span>- ${money(c.monto)}</span></div>`).join('')}</div>`:'');
  document.getElementById('cartTotal').textContent=money(r.total);
}
function openCart(){ document.getElementById('overlay').classList.add('on'); document.getElementById('drawer').classList.add('on'); }
function closeCart(){ document.getElementById('overlay').classList.remove('on'); document.getElementById('drawer').classList.remove('on'); }
document.getElementById('cartBtn').onclick=openCart;
document.getElementById('closeCart').onclick=closeCart;
document.getElementById('overlay').onclick=closeCart;
document.getElementById('waBtn').onclick=()=>{
  if(!cart.length) return;
  const r=computeCart();
  const nombre=document.getElementById('cName').value.trim();
  let msg=`*Nuevo pedido — ${CONFIG.TIENDA_NOMBRE}*\n\n`;
  r.lines.forEach(l=>{ msg+=`• ${l.qty}× ${l.nombre} (${l.tamano}) — ${money(l.lineTotal)}${l.promo?' ['+l.promo+']':''}\n`; });
  r.comboDisc.forEach(c=>{ msg+=`🎁 ${c.nombre}: - ${money(c.monto)}\n`; });
  msg+=`\n*Total: ${money(r.total)}*`;
  if(nombre) msg+=`\n\nCliente: ${nombre}`;
  window.open(`https://wa.me/${CONFIG.WHATSAPP}?text=${encodeURIComponent(msg)}`,'_blank');
};

let t; document.getElementById('search').oninput=e=>{ clearTimeout(t); t=setTimeout(()=>{ q=e.target.value.toLowerCase().trim(); render(); },180); };
document.getElementById('sort').onchange=render;
let tt; function toast(m){ const el=document.getElementById('toast'); el.textContent=m; el.classList.add('on'); clearTimeout(tt); tt=setTimeout(()=>el.classList.remove('on'),1800); }

renderCart(); load();
</script>
</body>
</html>
